<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Dito CMS</title>
    <script>
      // Apply the stored theme before paint to avoid a flash of the wrong theme.
      // Keep the key in sync with THEME_STORAGE_KEY in src/app/lib/theme.tsx.
      (function () {
        try {
          var stored = localStorage.getItem("dito-cms-theme");
          var dark =
            stored === "dark" ||
            ((stored === "system" || !stored) &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
